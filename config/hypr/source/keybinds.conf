# hyprland keybindings

$terminal    = kitty
$fileManager = nautilus
$browser     = firefox
$textEditor  = kitty -e nvim

# script path
$scripts     = $HOME/.local/bin

# main key
$mainMod = SUPER

# application launchers (using uwsm)
bindd = $mainMod, semicolon, Launch Terminal, exec, uwsm-app -- $terminal
bindd = $mainMod, N, Launch Browser, exec, uwsm-app -- $browser
bindd = $mainMod, E, File Manager, exec, uwsm-app -- $fileManager
bindd = $mainMod, M, Open Text Editor, exec, $textEditor

# rofi menus (toggle_rofi.sh make them toggle on/off on key presses)
bindd = ALT, SPACE, Launch Apps Menu, exec, uwsm-app -- $scripts/toggle_rofi.sh rofi -show drun -theme ~/.config/rofi/minimal.rasi -run-command "uwsm app -- {cmd}"
bindd = CTRL SHIFT, SPACE, Show Keybinds, exec, uwsm-app -- $scripts/toggle_rofi.sh $scripts/keybindings.sh
bindd = $mainMod CTRL, SPACE, Search Emojis, exec, uwsm-app -- $scripts/toggle_rofi.sh $scripts/emoji.sh
bindd = $mainMod CTRL, V, Icon Picker, exec, uwsm-app -- $scripts/toggle_rofi.sh $scripts/icons.sh
bindd = CTRL, SPACE, Rofi Wallpaper Selector, exec, uwsm-app -- $scripts/toggle_rofi.sh $scripts/rofi_wallpaper_selector.sh
bindd = CTRL ALT, SPACE, Wallpaper Cache Refresh, exec, uwsm-app -- $scripts/toggle_rofi.sh $scripts/refresh_wallpaper_cache.sh
bindd = ALT, 1, UWSM uuctl, exec, uwsm-app -- $scripts/toggle_rofi.sh uuctl

# power menu
bindd = ALT SHIFT, SPACE, Power Menu, exec, uwsm-app -- $scripts/toggle_rofi.sh rofi -show power-menu -modi power-menu:$scripts/powermenu.sh -theme ~/.config/rofi/newui.rasi

# system monitor
bindd = CTRL SHIFT, escape, System Monitor, exec, uwsm-app -- $terminal --class dgop -e dgop

# ssh manager (config in sessions.conf)
bindd = $mainMod CTRL, S, SSH/RDP Manager, exec, uwsm-app -- $scripts/toggle_rofi.sh $scripts/ssh_manager.sh

# system utilities

# game mode (mostly useless xd)
bind = $mainMod, F12, submap, game

submap = game
bind = $mainMod, F12, submap, reset
bind = $mainMod, Escape, submap, reset
submap = reset

submap = eww-panel
bind = ,escape,exec,eww close-all && hyprctl dispatch submap reset
submap = reset

# waybar stop start
bindd = ALT, 9, Start Waybar, exec, uwsm-app -- $scripts/waybar_autostart.sh
bindld = ALT, 0, Kill Waybar, exec, pkill waybar

# logout menu
bindd = $mainMod, Escape, Logout Menu, exec, uwsm-app -- $scripts/logout.sh
bindd = ALT, F4, Logout Menu, exec, wlogout

# hyprland reload
bindld = ALT, R, Reload Hyprland, exec, hyprctl reload

# sliders
bindd = ALT, H, Hyprsunset Slider, exec, uwsm-app -- $scripts/hyprsunset_slider.sh
bindd = ALT, V, Volume Slider, exec, uwsm-app -- $scripts/volume_slider.sh
bindd = ALT, B, Brightness Slider, exec, uwsm-app -- $scripts/brightness_slider.sh

# screenshot & clipboard

# clipboard history
bindd = $mainMod, V, Clipboard History, exec, pkill -x rofi || uwsm-app -- rofi -show clipboard -modes "clipboard:$HOME/.local/bin/rofi_cliphist.sh" -theme $HOME/.config/rofi/config.rasi

# color picker
bindd = $mainMod, B, Color Picker, exec, pkill hyprpicker || hyprpicker -a

# screenshots
bindd = $mainMod, S, Quick Screenshot, exec, pgrep slurp || (slurp | grim -g - - | wl-copy -t image/png)
bindd = SHIFT, Print, Full Screen Quick Screenshot, exec, grim - | wl-copy && notify-send "Fullscreen Screenshot in Clipboard"
bindd = $mainMod SHIFT, S, Screenshot and Annotation, exec, slurp | grim -g - - | uwsm-app -- swappy -f -
bindd = , Print, Fullscreen Screenshot and Annotation, exec, grim - | uwsm-app -- swappy -f -

# OCR (gud feature)
bindd = $mainMod, T, OCR Selection, exec, pgrep tesseract || (slurp | grim -g - - | tesseract stdin stdout -l eng | wl-copy)
bindd = $mainMod SHIFT, T, OCR Fullscreen, exec, grim - | tesseract stdin stdout -l eng | wl-copy

# notifications & screen lock

# notifications
bindd = ALT, equal, Open Notifications, exec, uwsm-app -- swaync-client -t
bindld = ALT, D, Dismiss Notifications, exec, swaync-client -C

# lock screen
bindd = $mainMod, L, Lock Screen, exec, uwsm-app -- $scripts/lock.sh

# window management

# window actions
bindd = $mainMod, Q, Close Window, killactive,
bindd = $mainMod, F, Toggle Floating, exec, if hyprctl -j activewindow | jq -e '.floating | not'; then hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 90% 90%; dispatch centerwindow"; else hyprctl dispatch togglefloating; fi
bindd = $mainMod SHIFT, F, Window Fullscreen, fullscreen, 0
bindd = $mainMod, P, Pseudo Tile, pseudo,
bindd = $mainMod, G, Toggle Split, togglesplit,

# window switching
bindd = $mainMod, left, Move Focus Left, movefocus, l
bindd = $mainMod, right, Move Focus Right, movefocus, r
bindd = $mainMod, up, Move Focus Up, movefocus, u
bindd = $mainMod, down, Move Focus Down, movefocus, d

# window moving
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# window resizing
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# workspace management

# switch workspaces
bindd = $mainMod, 1, Workspace 1, workspace, 1
bindd = $mainMod, 2, Workspace 2, workspace, 2
bindd = $mainMod, 3, Workspace 3, workspace, 3
bindd = $mainMod, 4, Workspace 4, workspace, 4
bindd = $mainMod, 5, Workspace 5, workspace, 5
bindd = $mainMod, 6, Workspace 6, workspace, 6
bindd = $mainMod, 7, Workspace 7, workspace, 7
bindd = $mainMod, 8, Workspace 8, workspace, 8
bindd = $mainMod, 9, Workspace 9, workspace, 9
bindd = $mainMod, 0, Workspace 10, workspace, 10

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# special workspace (scratchpad)
bindd = $mainMod, code:49, Toggle Special Workspace, togglespecialworkspace, magic
bind = $mainMod SHIFT, code:49, movetoworkspace, special:magic

# mouse bindings

# move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# hardware keys (media, audio, brightness)

# volume control
bindld = , XF86AudioRaiseVolume, Volume Up, exec, $osdclient --output-volume raise
bindld = , XF86AudioLowerVolume, Volume Down, exec, $osdclient --output-volume lower
bindld = , XF86AudioMute, Toggle Mute, exec, $osdclient --output-volume mute-toggle
bindld = , XF86AudioMicMute, Toggle Mic Mute, exec, $osdclient --input-volume mute-toggle

# brightness control
bindld = , XF86MonBrightnessUp, Brightness Up, exec, $osdclient --brightness raise
bindld = , XF86MonBrightnessDown, Brightness Down, exec, $osdclient --brightness lower

# media controls
bindld = , XF86AudioPlay, Play/Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioNext, Next Track, exec, playerctl next
bindld = , XF86AudioPrev, Previous Track, exec, playerctl previous
bindld = $mainMod, P, Toggle Pause, exec, $osdclient --playerctl play-pause
bindld = ALT, P, Mute Audio, exec, $osdclient --output-volume mute-toggle

source = ~/.config/matugen/generated/hyprland-colors.conf

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10
    gaps_workspaces = 0
    border_size = 2

    col.active_border = $outline
    col.inactive_border = $outline_variant

    # resize by dragging gaps + border
    resize_on_border = false

    allow_tearing = true

    layout = dwindle

    snap {
        enabled = false
        window_gap = 10
        monitor_gap = 10
        border_overlap = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2.0

    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.2
    dim_special = 0.8

    shadow {
        enabled = true
        range = 20
        render_power = 3
        sharp = false
        ignore_window = true
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.06
        contrast = 0.7
        vibrancy = 0.1696
        popups = true
    }
}

# https://wiki.hyprland.org/Configuring/Animations/
source = ~/.config/hypr/source/animations/animation.conf

dwindle {
    pseudotile = true
    preserve_split = true
    # smart_split = false     # splits based on mouse position
    # smart_resizing = false  # resize direction based on mouse pos
}

master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

binds {
    allow_pin_fullscreen = true
}

# Override WirePlumber's default pause-on-idle=false for ALSA nodes.
# Without this, PipeWire's processing loop runs continuously even with no audio
# playing, preventing the CPU from entering deep C-states and costing ~2-3W idle.
# With pause-on-idle=true, nodes stop processing when idle and fully suspend
# after 5 seconds, allowing the HDA controller to power down.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*" }
      { node.name = "~alsa_input.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = true
        session.suspend-timeout-seconds = 5
      }
    }
  }
]

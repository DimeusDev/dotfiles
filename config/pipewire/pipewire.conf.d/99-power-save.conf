# Raise PipeWire's minimum quantum from 32 to 1024 samples.
# Default min-quantum of 32 at 48kHz = 0.67ms timer period = ~1500 wakeups/sec
# even with no audio playing, preventing the CPU from entering deep C-states.
# 1024 samples = 21ms period = ~47 wakeups/sec, saving ~1-2W at idle.
# max-quantum = 8192 allows very long sleep periods when truly idle.

context.properties = {
    default.clock.min-quantum = 1024
    default.clock.max-quantum = 8192
}

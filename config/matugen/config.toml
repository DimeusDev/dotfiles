[templates.cava]
input_path  = '~/.config/matugen/templates/cava-colors.ini'
output_path = '~/.config/matugen/generated/cava-colors.ini'
post_hook   = '''
mkdir -p $HOME/.config/cava/themes;
ln -nfs $HOME/.config/matugen/generated/cava-colors.ini $HOME/.config/cava/themes/cava-colors;
pkill -USR1 cava || true
'''

[templates.btop]
input_path  = '~/.config/matugen/templates/btop.theme'
output_path = '~/.config/matugen/generated/btop-colors.theme'
post_hook   = '''
mkdir -p $HOME/.config/btop/themes;
ln -nfs $HOME/.config/matugen/generated/btop-colors.theme $HOME/.config/btop/themes/matugen.theme
notify-send "theme" "updated"
'''
[templates.rmpc]
input_path = '~/.config/matugen/templates/rmpc-theme.ron'
output_path = '~/.config/rmpc/themes/pywal16.ron'

# icon theme (colloid)

[templates.icons]
input_path  = '~/.config/matugen/templates/folder-color.txt'
output_path = '~/.config/matugen/papirus-folders/folder-color.txt'
post_hook   = '~/.local/bin/change-icons.sh || true'

[templates.lyric_color]
input_path = "~/.config/matugen/templates/lyric-color.env"
output_path = "~/.config/sptlrx/lyric-color.env"
